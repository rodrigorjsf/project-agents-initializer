name: Feature Request
description: Propose a new feature or improvement. Explain the problem first — solutions without problems will be closed.
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        **Before submitting:** Search [existing issues](https://github.com/rodrigoknascimento/project-agents-initializer/issues) for duplicates or prior art.
        If a related closed issue exists, explain what's different about your proposal.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        What problem does this solve? What user experience motivates this?
        "Improving" something is not a problem statement. Describe the specific friction, failure, or gap you encountered.
        Include context: what you were trying to do, what went wrong, and why existing functionality doesn't cover it.
      placeholder: "When initializing agent artifacts for a project that uses both Python and TypeScript, the scope detector fails to identify language-specific conventions because..."
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which area does this feature affect?
      options:
        - new skill
        - existing skill improvement
        - new plugin
        - infrastructure
        - documentation
        - other
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: |
        How should this work? Describe the expected behavior, not the implementation.
        If you have a specific design in mind, outline it — but keep the focus on what the user experiences.
      placeholder: "The scope detector should analyze package.json and pyproject.toml to identify language boundaries, then generate separate scope files for each language context..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: |
        What other approaches did you evaluate? Why were they worse?
        If you didn't consider alternatives, say so — but know that's a red flag.
    validations:
      required: true

  - type: dropdown
    id: core-fit
    attributes:
      label: Is this appropriate for the core toolkit?
      description: |
        agent-engineering-toolkit contains general-purpose plugins and infrastructure that benefit all users.
        Domain-specific skills, third-party integrations, and project-specific workflows belong in separate plugins.
      options:
        - "yes — benefits all users"
        - "maybe — could be a separate plugin"
        - "no — this is project-specific"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: This feature benefits users beyond my specific project
          required: true
        - label: I have considered whether this belongs in a separate plugin
          required: true
